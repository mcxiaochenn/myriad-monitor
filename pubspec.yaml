name: myriad_monitor
description: 系统资源监控工具 - 实时监控 CPU、内存、磁盘、网络等系统信息
publish_to: 'none'
version: 0.0.1+0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 系统信息获取
  system_info2: ^4.0.0

  # Windows API 绑定
  win32: ^5.0.0

  # FFI 工具
  ffi: ^2.0.0

  # HTTP 服务器框架
  shelf: ^1.4.0
  shelf_router: ^1.1.0

  # 加密哈希
  crypto: ^3.0.6

  # 图表绘制
  fl_chart: ^0.68.0

  # 本地数据存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 偏好设置存储
  shared_preferences: ^2.2.0

  # 路径获取
  path_provider: ^2.1.0

  # UUID 生成
  uuid: ^4.0.0

  # 状态管理
  flutter_riverpod: ^2.4.0

  # URL 启动
  url_launcher: ^6.2.0

  # QR 码生成与扫描
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/applogo_light.png
    - assets/applogo_night.png
