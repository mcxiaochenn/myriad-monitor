name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ===================================================================
  # 版本解析
  # ===================================================================
  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.name.outputs.version_name }}
      version_code: ${{ steps.code.outputs.version_code }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version name from pubspec.yaml
        id: name
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VERSION_NAME="${VER%+*}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Compute version code from git history
        id: code
        run: |
          CODE=$((10001 + $(git rev-list --count HEAD)))
          echo "version_code=$CODE" >> $GITHUB_OUTPUT

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ steps.name.outputs.version_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

  # ===================================================================
  # 全平台构建（纯构建，不含打包）
  # ===================================================================
  build-windows:
    name: Build Windows
    needs: [resolve]
    uses: ./.github/workflows/build-windows.yml
    with:
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
    secrets: inherit

  build-macos:
    name: Build macOS
    needs: [resolve]
    uses: ./.github/workflows/build-macos.yml
    with:
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
    secrets: inherit

  build-linux:
    name: Build Linux
    needs: [resolve]
    uses: ./.github/workflows/build-linux.yml
    with:
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
    secrets: inherit

  build-android:
    name: Build Android
    needs: [resolve]
    uses: ./.github/workflows/build-android.yml
    with:
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
    secrets: inherit

  build-ios:
    name: Build iOS
    needs: [resolve]
    uses: ./.github/workflows/build-ios.yml
    with:
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
    secrets: inherit

  # ===================================================================
  # 打包（release 模式：完整打包）
  # ===================================================================
  package-windows:
    name: Package Windows
    needs: [resolve, build-windows]
    if: always() && needs.build-windows.result == 'success'
    runs-on: windows-latest
    env:
      VER: ${{ needs.resolve.outputs.version_name }}
      CODE: ${{ needs.resolve.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "myriad-monitor-v${VER}_${CODE}-windows-portable.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: myriad-monitor-v*_*-windows-portable.zip

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Update installer version
        run: |
          (Get-Content windows\installer.iss) `
            -replace 'AppVersion=.*', 'AppVersion=${{ env.VER }}' |
          Set-Content windows\installer.iss

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss

      - name: Rename installer
        run: |
          $installer = Get-ChildItem build/windows/installer/*.exe | Select-Object -First 1
          Rename-Item $installer.FullName "myriad-monitor-v${VER}_${CODE}-windows-installer.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: myriad-monitor-v*_*-windows-installer.exe
          if-no-files-found: warn

  package-macos:
    name: Package macOS
    needs: [resolve, build-macos]
    if: always() && needs.build-macos.result == 'success'
    runs-on: macos-latest
    env:
      VER: ${{ needs.resolve.outputs.version_name }}
      CODE: ${{ needs.resolve.outputs.version_code }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: macos-build
          path: macos-build/

      - name: Create DMG
        run: |
          APP_PATH=$(find macos-build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found"
            exit 1
          fi
          hdiutil create -volname "Myriad Monitor" -srcfolder "$APP_PATH" -ov -format UDZO \
            "myriad-monitor-v${VER}_${CODE}-macos.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: myriad-monitor-v*_*-macos.dmg

  package-linux:
    name: Package Linux
    needs: [resolve, build-linux]
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.resolve.outputs.version_name }}
      APP_BUILD_NUMBER: ${{ needs.resolve.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: { name: linux-build, path: linux-build/ }
      - run: bash .github/scripts/package.sh linux
      - uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: myriad-monitor-v*_*-linux.tar.gz

  package-android:
    name: Package Android
    needs: [resolve, build-android]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.resolve.outputs.version_name }}
      APP_BUILD_NUMBER: ${{ needs.resolve.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: { name: android-build-release }
      - uses: actions/download-artifact@v7
        with: { name: android-build-debug }
      - run: bash .github/scripts/package.sh android
      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: myriad-monitor-v*_*-android-release.apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-debug
          path: myriad-monitor-v*_*-android-debug.apk

  # ===================================================================
  # 创建 GitHub Release
  # ===================================================================
  create-release:
    name: Create Release
    needs: [resolve, package-windows, package-macos, package-linux, package-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create git tag if needed
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag "$TAG"
              git push origin "$TAG"
            fi
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
            echo "full_changelog=https://github.com/$GITHUB_REPOSITORY/commits/$TAG" >> $GITHUB_OUTPUT
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "full_changelog=https://github.com/$GITHUB_REPOSITORY/compare/${PREV_TAG}...${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: ${{ needs.resolve.outputs.release_tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            **Full Changelog**: ${{ steps.changelog.outputs.full_changelog }}
          files: |
            windows-portable/*.zip
            windows-installer/*.exe
            macos-dmg/*.dmg
            linux-bundle/*.tar.gz
            android-release/*.apk
            android-debug/*.apk
          draft: false
          prerelease: false
