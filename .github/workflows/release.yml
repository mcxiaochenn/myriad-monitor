name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

jobs:
  # Windows 构建（便携版 + 安装包）
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms windows .

      - run: flutter pub get

      - run: flutter build windows --release

      # 创建便携版 ZIP
      - name: Create portable ZIP
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath myriad-monitor-windows-portable.zip

      # 创建安装包（使用 Inno Setup）
      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: myriad-monitor-windows-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/installer/*.exe

  # macOS 构建（DMG 安装包）
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms macos .

      - run: flutter pub get

      - run: flutter build macos --release

      # 创建 DMG
      - name: Create DMG
        run: |
          # 查找 .app 文件
          APP_PATH=$(find build/macos -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          hdiutil create -volname "Myriad Monitor" -srcfolder "$APP_PATH" -ov -format UDZO myriad-monitor-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: myriad-monitor-macos.dmg

  # Linux 构建
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev

      - run: flutter create --project-name myriad_monitor --platforms linux .

      - run: flutter pub get

      - run: flutter build linux --release

      # 创建 tar.gz
      - name: Create tar.gz
        run: |
          cd build/linux/x64/release/bundle/
          tar -czf ../../../../../myriad-monitor-linux.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: myriad-monitor-linux.tar.gz

  # Android 构建（正式版 + 测试版）
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms android .

      - run: flutter pub get

      # 解码签名密钥
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks

      # 构建正式版 APK
      - name: Build release APK
        run: flutter build apk --release
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PATH: key.jks

      # 构建测试版 APK（使用不同的包名）
      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  # 创建 GitHub Release
  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            # 生成 changelog
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          body: |
            ## 万镜 Myriad ${{ github.ref_name }}

            去中心化的跨平台系统监控面板

            ## 更新内容

            ${{ steps.changelog.outputs.changelog }}

            ## 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `myriad-monitor-windows-portable.zip` | 便携版，解压即用 |
            | Windows | `myriad-monitor-windows-installer.exe` | 安装包 |
            | macOS | `myriad-monitor-macos.dmg` | DMG 安装包 |
            | Linux | `myriad-monitor-linux.tar.gz` | tar.gz 包 |
            | Android | `app-release.apk` | 正式版 (com.chendusk.myriadmonitor) |
            | Android | `app-debug.apk` | 测试版 (com.chendusk.myriadmonitor.dev) |

            ## 系统要求

            - **Windows**: Windows 10+
            - **macOS**: macOS 10.15+
            - **Linux**: X11/Wayland
            - **Android**: Android 6.0+
            - **iOS**: iOS 12.0+

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.changelog.outputs.prev_tag }}...${{ github.ref_name }}
          files: |
            windows-portable/myriad-monitor-windows-portable.zip
            windows-installer/*.exe
            macos-dmg/myriad-monitor-macos.dmg
            linux-bundle/myriad-monitor-linux.tar.gz
            android-release/app-release.apk
            android-debug/app-debug.apk
          draft: false
          prerelease: false
