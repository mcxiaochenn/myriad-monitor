name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 版本解析：版本名来自 pubspec.yaml + 版本码从 git 历史自动计算
  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.name.outputs.version_name }}
      version_code: ${{ steps.code.outputs.version_code }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version name from pubspec.yaml
        id: name
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VERSION_NAME="${VER%+*}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "pubspec.yaml → version=$VERSION_NAME"

      - name: Compute version code from git history
        id: code
        run: |
          CODE=$((10001 + $(git rev-list --count HEAD)))
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "git rev-list --count HEAD → version_code=$CODE"

      - name: Resolve release tag
        id: tag
        run: |
          # tag push → 用 git ref；手动触发 → 从 pubspec.yaml 自动生成
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ steps.name.outputs.version_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG (event: ${{ github.event_name }})"

  # ===================================================================
  # 全平台构建（调用可复用工作流，release_mode 开启额外打包）
  # ===================================================================
  build-windows:
    name: Build Windows
    needs: [resolve]
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: windows
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
      release_mode: true
    secrets: inherit

  build-macos:
    name: Build macOS
    needs: [resolve]
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: macos
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
      release_mode: true
    secrets: inherit

  build-linux:
    name: Build Linux
    needs: [resolve]
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: linux
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
      release_mode: true
    secrets: inherit

  build-android:
    name: Build Android
    needs: [resolve]
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: android
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
      release_mode: true
    secrets: inherit

  build-ios:
    name: Build iOS
    needs: [resolve]
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: ios
      app_version: ${{ needs.resolve.outputs.version_name }}
      build_number: ${{ needs.resolve.outputs.version_code }}
      release_mode: true
    secrets: inherit

  # ===================================================================
  # 创建 GitHub Release
  # ===================================================================
  create-release:
    name: Create Release
    needs: [resolve, build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create git tag if needed
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Creating tag: $TAG"
              git tag "$TAG"
              git push origin "$TAG"
            else
              echo "Tag $TAG already exists"
            fi
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
            echo "full_changelog=https://github.com/$GITHUB_REPOSITORY/commits/$TAG" >> $GITHUB_OUTPUT
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "full_changelog=https://github.com/$GITHUB_REPOSITORY/compare/${PREV_TAG}...${TAG}" >> $GITHUB_OUTPUT
          fi

      # Release：纯 tag 标题 + What's Changed + Full Changelog
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: ${{ needs.resolve.outputs.release_tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            **Full Changelog**: ${{ steps.changelog.outputs.full_changelog }}
          files: |
            windows-portable/*.zip
            windows-installer/*.exe
            macos-dmg/*.dmg
            linux-bundle/*.tar.gz
            android-release/*.apk
            android-debug/*.apk
          draft: false
          prerelease: false
