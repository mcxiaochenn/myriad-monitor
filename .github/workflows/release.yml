name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

env:
  # 统一用环境变量驱动 tag
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

jobs:
  # 版本解析：版本名来自 pubspec.yaml + 版本码从 git 历史自动计算
  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.name.outputs.version_name }}
      version_code: ${{ steps.code.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version name from pubspec.yaml
        id: name
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VERSION_NAME="${VER%+*}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "pubspec.yaml → version=$VERSION_NAME"

      - name: Compute version code from git history
        id: code
        run: |
          CODE=$((10001 + $(git rev-list --count HEAD)))
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "git rev-list --count HEAD → version_code=$CODE"

  # ===================================================================
  # Windows 构建
  # ===================================================================
  build-windows:
    name: Build Windows
    needs: [resolve]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms windows .

      - run: flutter pub get

      # 编译时注入版本号，实现 App UI 版本自动同步
      - run: >-
          flutter build windows --release
          --dart-define=APP_VERSION=${{ needs.resolve.outputs.version_name }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.resolve.outputs.version_code }}

      # 版本化命名：项目名-v版本名_版本码-平台.格式
      - name: Create portable ZIP
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "myriad-monitor-v${{ needs.resolve.outputs.version_name }}_${{ needs.resolve.outputs.version_code }}-windows-portable.zip"

      - name: Install Inno Setup
        run: choco install innosetup -y

      # 同步 installer 版本号
      - name: Update installer version
        run: |
          (Get-Content windows\installer.iss) `
            -replace 'AppVersion=.*', 'AppVersion=${{ needs.resolve.outputs.version_name }}' |
          Set-Content windows\installer.iss

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss

      - name: Rename installer
        run: |
          $installer = Get-ChildItem build/windows/installer/*.exe | Select-Object -First 1
          Rename-Item $installer.FullName "myriad-monitor-v${{ needs.resolve.outputs.version_name }}_${{ needs.resolve.outputs.version_code }}-windows-installer.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: myriad-monitor-v*_*-windows-portable.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: myriad-monitor-v*_*-windows-installer.exe
          if-no-files-found: warn

  # ===================================================================
  # macOS 构建
  # ===================================================================
  build-macos:
    name: Build macOS
    needs: [resolve]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms macos .

      - run: flutter pub get

      - run: >-
          flutter build macos --release
          --dart-define=APP_VERSION=${{ needs.resolve.outputs.version_name }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.resolve.outputs.version_code }}

      - name: Create DMG
        run: |
          APP_PATH=$(find build/macos -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          hdiutil create -volname "Myriad Monitor" -srcfolder "$APP_PATH" -ov -format UDZO \
            "myriad-monitor-v${{ needs.resolve.outputs.version_name }}_${{ needs.resolve.outputs.version_code }}-macos.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: myriad-monitor-v*_*-macos.dmg

  # ===================================================================
  # Linux 构建
  # ===================================================================
  build-linux:
    name: Build Linux
    needs: [resolve]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev

      - run: flutter create --project-name myriad_monitor --platforms linux .

      - run: flutter pub get

      - run: >-
          flutter build linux --release
          --dart-define=APP_VERSION=${{ needs.resolve.outputs.version_name }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.resolve.outputs.version_code }}

      - name: Create tar.gz
        run: |
          cd build/linux/x64/release/bundle/
          tar -czf "../../../../../myriad-monitor-v${{ needs.resolve.outputs.version_name }}_${{ needs.resolve.outputs.version_code }}-linux.tar.gz" *

      - uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: myriad-monitor-v*_*-linux.tar.gz

  # ===================================================================
  # Android 构建
  # ===================================================================
  build-android:
    name: Build Android
    needs: [resolve]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms android .

      - run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks

      - name: Build release APK
        run: >-
          flutter build apk --release
          --dart-define=APP_VERSION=${{ needs.resolve.outputs.version_name }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.resolve.outputs.version_code }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PATH: key.jks

      - name: Build debug APK
        run: >-
          flutter build apk --debug
          --dart-define=APP_VERSION=${{ needs.resolve.outputs.version_name }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.resolve.outputs.version_code }}

      # 项目名-v版本名_版本码-平台.apk
      - name: Rename APKs
        run: |
          VER="${{ needs.resolve.outputs.version_name }}"
          CODE="${{ needs.resolve.outputs.version_code }}"
          mv build/app/outputs/flutter-apk/app-release.apk "myriad-monitor-v${VER}_${CODE}-android-release.apk"
          mv build/app/outputs/flutter-apk/app-debug.apk "myriad-monitor-v${VER}_${CODE}-android-debug.apk"

      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: myriad-monitor-v*_*-android-release.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android-debug
          path: myriad-monitor-v*_*-android-debug.apk

  # ===================================================================
  # iOS 构建
  # ===================================================================
  build-ios:
    name: Build iOS
    needs: [resolve]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms ios .

      - run: flutter pub get

      - run: >-
          flutter build ios --release --no-codesign
          --dart-define=APP_VERSION=${{ needs.resolve.outputs.version_name }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.resolve.outputs.version_code }}

      - uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: build/ios/iphoneos/

  # ===================================================================
  # 创建 GitHub Release
  # ===================================================================
  create-release:
    name: Create Release
    needs: [resolve, build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG (event: ${{ github.event_name }})"

      # 验证 tag 与 pubspec.yaml 版本号一致
      - name: Validate tag matches pubspec version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          EXPECTED="v${{ needs.resolve.outputs.version_name }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "❌ Tag mismatch!"
            echo "   Tag:     $TAG"
            echo "   Expected: $EXPECTED (from pubspec.yaml)"
            echo "   Please ensure the tag matches pubspec.yaml version."
            exit 1
          fi
          echo "✓ Tag '$TAG' matches pubspec.yaml version"

      - name: Create git tag if needed
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Creating tag: $TAG"
              git tag "$TAG"
              git push origin "$TAG"
            else
              echo "Tag $TAG already exists"
            fi
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
            echo "full_changelog=https://github.com/$GITHUB_REPOSITORY/commits/$TAG" >> $GITHUB_OUTPUT
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "full_changelog=https://github.com/$GITHUB_REPOSITORY/compare/${PREV_TAG}...${TAG}" >> $GITHUB_OUTPUT
          fi

      # Release：纯 tag 标题 + What's Changed + Full Changelog
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            **Full Changelog**: ${{ steps.changelog.outputs.full_changelog }}
          files: |
            windows-portable/*.zip
            windows-installer/*.exe
            macos-dmg/*.dmg
            linux-bundle/*.tar.gz
            android-release/*.apk
            android-debug/*.apk
          draft: false
          prerelease: false
