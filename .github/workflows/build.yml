name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ===================================================================
  # 版本解析：读取版本名 + 计算版本码
  # 版本码 = 10001 + git rev-list --count HEAD（总提交数，幂等）
  # PR 时跳过（CI 验证不需要消耗版本码）
  # ===================================================================
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      version_name: ${{ steps.name.outputs.version_name }}
      version_code: ${{ steps.code.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version name from pubspec.yaml
        id: name
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VERSION_NAME="${VER%+*}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "pubspec.yaml → version=$VERSION_NAME"

      - name: Compute version code from git history
        id: code
        run: |
          CODE=$((10001 + $(git rev-list --count HEAD)))
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "git rev-list --count HEAD → version_code=$CODE"

  # ===================================================================
  # 全平台构建（调用可复用工作流）
  # ===================================================================
  build-windows:
    name: Build Windows
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: windows
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-macos:
    name: Build macOS
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: macos
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-linux:
    name: Build Linux
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: linux
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-android:
    name: Build Android
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: android
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-ios:
    name: Build iOS
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platforms.yml
    with:
      platform: ios
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  # ===================================================================
  # WAA 打包：Windows + Android Release 产物合并下载
  # ===================================================================
  bundle-waa:
    name: Bundle WAA (Windows + Android)
    needs: [version, build-windows, build-android]
    if: |
      always() &&
      (needs.version.result == 'success' || needs.version.result == 'skipped') &&
      needs.build-windows.result == 'success' &&
      needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: windows-portable

      - name: Download Android release artifact
        uses: actions/download-artifact@v7
        with:
          name: android-release

      - name: Create WAA combined package
        run: |
          if [ "$APP_BUILD_NUMBER" != "0" ]; then
            NAME="waa(windows and android)-release-v${APP_VERSION}_${APP_BUILD_NUMBER}"
          else
            NAME="waa(windows and android)-dev"
          fi
          zip -r "${NAME}.zip" .
          echo "Created: ${NAME}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: waa-bundle
          path: waa(windows and android)-*.zip
