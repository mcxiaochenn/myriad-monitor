name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ===================================================================
  # 版本解析
  # ===================================================================
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      version_name: ${{ steps.name.outputs.version_name }}
      version_code: ${{ steps.code.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version name from pubspec.yaml
        id: name
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VERSION_NAME="${VER%+*}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Compute version code from git history
        id: code
        run: |
          CODE=$((10001 + $(git rev-list --count HEAD)))
          echo "version_code=$CODE" >> $GITHUB_OUTPUT

  # ===================================================================
  # 全平台构建（纯构建，不含打包）
  # ===================================================================
  build-windows:
    name: Build Windows
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platform.yml
    with:
      platform: windows
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-macos:
    name: Build macOS
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platform.yml
    with:
      platform: macos
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-linux:
    name: Build Linux
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platform.yml
    with:
      platform: linux
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-android:
    name: Build Android
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platform.yml
    with:
      platform: android
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  build-ios:
    name: Build iOS
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    uses: ./.github/workflows/build-platform.yml
    with:
      platform: ios
      app_version: ${{ needs.version.outputs.version_name || 'dev' }}
      build_number: ${{ needs.version.outputs.version_code || '0' }}
    secrets: inherit

  # ===================================================================
  # 打包（调用 package.sh）
  # ===================================================================
  package-windows:
    name: Package Windows
    needs: [version, build-windows]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: { name: windows-build, path: windows-build/ }
      - run: bash .github/scripts/package.sh windows
      - uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: myriad-monitor-*-windows-portable.zip

  package-macos:
    name: Package macOS
    needs: [version, build-macos]
    if: always() && needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: { name: macos-build, path: macos-build/ }
      - run: bash .github/scripts/package.sh macos
      - uses: actions/upload-artifact@v7
        with:
          name: macos-release
          path: myriad-monitor-*-macos.zip

  package-linux:
    name: Package Linux
    needs: [version, build-linux]
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: { name: linux-build, path: linux-build/ }
      - run: bash .github/scripts/package.sh linux
      - uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: myriad-monitor-*-linux.tar.gz

  package-android:
    name: Package Android
    needs: [version, build-android]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: { name: android-build-release }
      - uses: actions/download-artifact@v7
        with: { name: android-build-debug }
      - run: bash .github/scripts/package.sh android
      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: myriad-monitor-*-android-release.apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-debug
          path: myriad-monitor-*-android-debug.apk

  # ===================================================================
  # WAA 打包：Windows + Android Release 产物合并下载
  # ===================================================================
  bundle-waa:
    name: Bundle WAA (Windows + Android)
    needs: [version, package-windows, package-android]
    if: |
      always() &&
      needs.package-windows.result == 'success' &&
      needs.package-android.result == 'success'
    runs-on: ubuntu-latest
    env:
      VER: ${{ needs.version.outputs.version_name || 'dev' }}
      CODE: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: windows-release

      - uses: actions/download-artifact@v7
        with:
          name: android-release

      - name: Create WAA combined package
        run: |
          SUFFIX=$([[ "$CODE" != "0" ]] && echo "v${VER}_${CODE}" || echo "dev")
          zip -r "waa(windows and android)-release-${SUFFIX}.zip" .

      - uses: actions/upload-artifact@v7
        with:
          name: waa-bundle
          path: waa(windows and android)-*.zip
