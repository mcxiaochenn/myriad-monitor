name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ===================================================================
  # 版本解析：读取版本名 + 计算版本码
  # 版本码 = 10001 + git rev-list --count HEAD（总提交数，幂等）
  # PR 时跳过（CI 验证不需要消耗版本码）
  # ===================================================================
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      version_name: ${{ steps.name.outputs.version_name }}
      version_code: ${{ steps.code.outputs.version_code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version name from pubspec.yaml
        id: name
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VERSION_NAME="${VER%+*}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "pubspec.yaml → version=$VERSION_NAME"

      - name: Compute version code from git history
        id: code
        run: |
          CODE=$((10001 + $(git rev-list --count HEAD)))
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "git rev-list --count HEAD → version_code=$CODE"

  # ===================================================================
  # Windows 构建
  # ===================================================================
  build-windows:
    name: Build Windows
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: windows-latest
    env:
      # version job 被跳过（PR）时使用回退值
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms windows .

      - run: flutter pub get

      # 编译时注入版本号，实现 App UI 版本自动同步
      - run: >-
          flutter build windows --release
          --dart-define=APP_VERSION=${{ env.APP_VERSION }}
          --dart-define=APP_BUILD_NUMBER=${{ env.APP_BUILD_NUMBER }}

      - name: Create ZIP
        shell: pwsh
        run: |
          $ver = if ("${{ env.APP_BUILD_NUMBER }}" -ne "0") {
            "v${{ env.APP_VERSION }}_${{ env.APP_BUILD_NUMBER }}"
          } else {
            "dev"
          }
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "myriad-monitor-$ver-windows.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: myriad-monitor-*-windows.zip

  # ===================================================================
  # Android 构建
  # ===================================================================
  build-android:
    name: Build Android
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms android .

      - run: flutter pub get

      - run: >-
          flutter build apk --release
          --dart-define=APP_VERSION=${{ env.APP_VERSION }}
          --dart-define=APP_BUILD_NUMBER=${{ env.APP_BUILD_NUMBER }}

      - name: Rename APK
        run: |
          if [ "$APP_BUILD_NUMBER" != "0" ]; then
            PREFIX="myriad-monitor-v${APP_VERSION}_${APP_BUILD_NUMBER}"
          else
            PREFIX="myriad-monitor-dev"
          fi
          mv build/app/outputs/flutter-apk/app-release.apk "${PREFIX}-android.apk"

      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: myriad-monitor-*-android.apk

  # ===================================================================
  # macOS 构建
  # ===================================================================
  build-macos:
    name: Build macOS
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms macos .

      - run: flutter pub get

      - run: >-
          flutter build macos --release
          --dart-define=APP_VERSION=${{ env.APP_VERSION }}
          --dart-define=APP_BUILD_NUMBER=${{ env.APP_BUILD_NUMBER }}

      - uses: actions/upload-artifact@v7
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/

  # ===================================================================
  # Linux 构建
  # ===================================================================
  build-linux:
    name: Build Linux
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev

      - run: flutter create --project-name myriad_monitor --platforms linux .

      - run: flutter pub get

      - run: >-
          flutter build linux --release
          --dart-define=APP_VERSION=${{ env.APP_VERSION }}
          --dart-define=APP_BUILD_NUMBER=${{ env.APP_BUILD_NUMBER }}

      - uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: build/linux/x64/release/bundle/

  # ===================================================================
  # iOS 构建
  # ===================================================================
  build-ios:
    name: Build iOS
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version_name || 'dev' }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.version_code || '0' }}
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create --project-name myriad_monitor --platforms ios .

      - run: flutter pub get

      - run: >-
          flutter build ios --release --no-codesign
          --dart-define=APP_VERSION=${{ env.APP_VERSION }}
          --dart-define=APP_BUILD_NUMBER=${{ env.APP_BUILD_NUMBER }}

      - uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: build/ios/iphoneos/
