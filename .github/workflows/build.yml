name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Windows 构建
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 生成平台目录
      - run: flutter create --project-name myriad_monitor --platforms windows .

      - run: flutter pub get

      - run: flutter build windows --release

      - uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/

  # Android 构建
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 生成平台目录
      - run: flutter create --project-name myriad_monitor --platforms android .

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v5
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  # macOS 构建
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 生成平台目录
      - run: flutter create --project-name myriad_monitor --platforms macos .

      - run: flutter pub get

      - run: flutter build macos --release

      - uses: actions/upload-artifact@v5
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/

  # Linux 构建
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 安装 Linux 桌面构建所需的系统依赖
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev

      # 生成平台目录
      - run: flutter create --project-name myriad_monitor --platforms linux .

      - run: flutter pub get

      - run: flutter build linux --release

      - uses: actions/upload-artifact@v5
        with:
          name: linux-release
          path: build/linux/x64/release/bundle/

  # iOS 构建（仅编译，不签名）
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 生成平台目录
      - run: flutter create --project-name myriad_monitor --platforms ios .

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v5
        with:
          name: ios-release
          path: build/ios/iphoneos/
