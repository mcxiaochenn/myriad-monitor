name: Build Platform

on:
  workflow_call:
    inputs:
      platform:
        description: '目标平台（windows/macos/linux/android/ios）'
        required: true
        type: string
      app_version:
        required: true
        type: string
      build_number:
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.platform }}
    runs-on: >-
      ${{
        (inputs.platform == 'windows' && 'windows-latest') ||
        (inputs.platform == 'macos' && 'macos-latest') ||
        (inputs.platform == 'ios' && 'macos-latest') ||
        'ubuntu-latest'
      }}
    env:
      APP_VERSION: ${{ inputs.app_version }}
      APP_BUILD_NUMBER: ${{ inputs.build_number }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        if: inputs.platform == 'android'
        with: { distribution: 'zulu', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: bash .github/scripts/build.sh ${{ inputs.platform }}
      - uses: actions/upload-artifact@v7
        if: inputs.platform == 'windows'
        with: { name: windows-build, path: build/windows/x64/runner/Release/ }
      - uses: actions/upload-artifact@v7
        if: inputs.platform == 'macos'
        with: { name: macos-build, path: build/macos/Build/Products/Release/ }
      - uses: actions/upload-artifact@v7
        if: inputs.platform == 'linux'
        with: { name: linux-build, path: build/linux/x64/release/bundle/ }
      - uses: actions/upload-artifact@v7
        if: inputs.platform == 'android'
        with: { name: android-build-release, path: build/app/outputs/flutter-apk/app-release.apk }
      - uses: actions/upload-artifact@v7
        if: inputs.platform == 'android'
        with: { name: android-build-debug, path: build/app/outputs/flutter-apk/app-debug.apk }
      - uses: actions/upload-artifact@v7
        if: inputs.platform == 'ios'
        with: { name: ios-build, path: build/ios/iphoneos/ }
