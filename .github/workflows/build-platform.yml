name: Build Platform

on:
  workflow_call:
    inputs:
      platform:
        description: '目标平台（windows/macos/linux/android/ios）'
        required: true
        type: string
      app_version:
        required: true
        type: string
      build_number:
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.platform }}
    runs-on: >-
      ${{
        (inputs.platform == 'windows' && 'windows-2019') ||
        (inputs.platform == 'macos' && 'macos-latest') ||
        (inputs.platform == 'ios' && 'macos-latest') ||
        'ubuntu-latest'
      }}
    env:
      APP_VERSION: ${{ inputs.app_version }}
      APP_BUILD_NUMBER: ${{ inputs.build_number }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        if: inputs.platform == 'android'
        with: { distribution: 'zulu', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: bash .github/scripts/build.sh ${{ inputs.platform }}

      # ── 收集产物到统一目录 ──
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          PLATFORM="${{ inputs.platform }}"
          case "$PLATFORM" in
            windows)
              cp -r build/windows/x64/runner/Release/* artifacts/ ;;
            macos)
              cp -r build/macos/Build/Products/Release/* artifacts/ ;;
            linux)
              cp -r build/linux/x64/release/bundle/* artifacts/ ;;
            android)
              cp build/app/outputs/flutter-apk/app-release.apk artifacts/
              cp build/app/outputs/flutter-apk/app-debug.apk artifacts/ ;;
            ios)
              cp -r build/ios/iphoneos/* artifacts/ ;;
          esac

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.platform }}-build
          path: artifacts/
