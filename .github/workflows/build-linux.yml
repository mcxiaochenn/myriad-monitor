name: Build Linux
on:
  workflow_call:
    inputs:
      app_version: { required: true, type: string }
      build_number: { required: true, type: string }

jobs:
  build:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ inputs.app_version }}
      APP_BUILD_NUMBER: ${{ inputs.build_number }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: bash .github/scripts/build.sh linux
      - uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
