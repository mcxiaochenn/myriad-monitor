name: Build Windows

on:
  workflow_call:
    inputs:
      app_version:
        required: true
        type: string
      build_number:
        required: true
        type: string

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ inputs.app_version }}
      APP_BUILD_NUMBER: ${{ inputs.build_number }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --project-name myriad_monitor --platforms windows .
      - run: git checkout -- windows/runner/Runner.rc windows/runner/resources/ || true
      - run: flutter pub get
      - run: >-
          flutter build windows --release
          --dart-define=APP_VERSION=${{ inputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ inputs.build_number }}
      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
