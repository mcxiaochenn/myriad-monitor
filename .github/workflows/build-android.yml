name: Build Android

on:
  workflow_call:
    inputs:
      app_version:
        required: true
        type: string
      build_number:
        required: true
        type: string

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ inputs.app_version }}
      APP_BUILD_NUMBER: ${{ inputs.build_number }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --project-name myriad_monitor --platforms android .
      - run: flutter pub get
      - name: Setup signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
          sed -i '/^android\.newDsl=/d' android/gradle.properties
      - run: >-
          flutter build apk --release
          --dart-define=APP_VERSION=${{ inputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ inputs.build_number }}
          --build-number=${{ inputs.build_number }}
      - run: >-
          flutter build apk --debug
          --dart-define=APP_VERSION=${{ inputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ inputs.build_number }}
          --build-number=${{ inputs.build_number }}
      - uses: actions/upload-artifact@v7
        with:
          name: android-build-release
          path: build/app/outputs/flutter-apk/app-release.apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-build-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
